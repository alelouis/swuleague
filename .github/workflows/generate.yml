name: Generate league images

on:
  push:
    branches: [main]
    paths:
      - "data/**"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Generate images
        run: python image.py

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="images-$(date -u +%Y%m%d-%H%M%S)"
          # Collect all generated images
          FILES=$(find output -name '*.png' -o -name '*.webp' | sort)
          if [ -z "$FILES" ]; then
            echo "No images generated, skipping release."
            exit 0
          fi
          # Build release notes from generated files
          BODY="Generated from data/ on $(date -u +%Y-%m-%d)."$'\n\n'
          BODY+="**Files:**"$'\n'
          for f in $FILES; do
            BODY+="- \`$f\`"$'\n'
          done
          gh release create "$TAG" \
            --title "Images $(date -u +%Y-%m-%d)" \
            --notes "$BODY" \
            $FILES
