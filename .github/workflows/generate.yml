name: Generate league images

on:
  push:
    branches: [main]
    paths:
      - "data/**"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Generate images
        run: python image.py

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          # output/set-7/all4play/etape_01.png -> release_assets/set-7_all4play_etape_01.png
          for f in $(find output -name '*.png' -o -name '*.webp' | sort); do
            rel="${f#output/}"
            flat=$(echo "$rel" | tr '/' '_')
            cp "$f" "release_assets/$flat"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="images-$(date -u +%Y%m%d-%H%M%S)"
          FILES=$(find release_assets -type f | sort)
          if [ -z "$FILES" ]; then
            echo "No images generated, skipping release."
            exit 0
          fi

          # Build structured release notes grouped by set > shop
          BODY="Generated from \`data/\` on $(date -u +%Y-%m-%d)."$'\n'
          PREV_SET="" PREV_SHOP=""
          for f in $FILES; do
            name=$(basename "$f")
            # set-7_all4play_etape_01.png -> set=set-7 shop=all4play rest=etape_01.png
            set_id=$(echo "$name" | cut -d_ -f1-2)   # e.g. set-7
            shop=$(echo "$name" | cut -d_ -f3)        # e.g. all4play
            rest=$(echo "$name" | cut -d_ -f4-)       # e.g. etape_01.png
            if [ "$set_id" != "$PREV_SET" ]; then
              BODY+=$'\n'"### ${set_id}"$'\n'
              PREV_SET="$set_id" PREV_SHOP=""
            fi
            if [ "$shop" != "$PREV_SHOP" ]; then
              BODY+=$'\n'"**${shop}**"$'\n'
              PREV_SHOP="$shop"
            fi
            BODY+="- \`${rest}\`"$'\n'
          done

          gh release create "$TAG" \
            --title "Images $(date -u +%Y-%m-%d)" \
            --notes "$BODY" \
            $FILES
